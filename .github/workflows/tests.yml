name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.7', '3.8', '3.9', '3.10', '3.11']
        exclude:
          # NumPy/Numba compatibility issues on some combinations
          - os: windows-latest
            python-version: '3.7'

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Lint with flake8
      run: |
        # Stop build if there are Python syntax errors or undefined names
        flake8 src/nonconvexAG --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 src/nonconvexAG --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
        
    - name: Check formatting with black
      run: |
        black --check src/nonconvexAG tests
        
    - name: Sort imports with isort
      run: |
        isort --check-only src/nonconvexAG tests
        
    - name: Type check with mypy
      run: |
        mypy src/nonconvexAG --ignore-missing-imports
        
    - name: Test with pytest
      run: |
        pytest tests -v --cov=nonconvexAG --cov-report=xml
        
    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.9'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
        
    - name: Build package
      run: |
        cd nonconvexAG
        python -m build
        
    - name: Check package
      run: |
        cd nonconvexAG
        twine check dist/*
        
    - name: Test installation
      run: |
        cd /tmp
        pip install ${{ github.workspace }}/nonconvexAG/dist/*.whl
        python -c "import nonconvexAG; print(nonconvexAG.__version__)"