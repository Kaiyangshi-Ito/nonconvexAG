name: Timestamp Commits

on:
  push:
    branches:
      - '**'

jobs:
  timestamp:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      
      - name: Install OTS
        run: pip install opentimestamps-client
      
      - name: Stamp commit
        run: |
          mkdir -p ots_proofs
          HASH="${{ github.sha }}"
          echo "${HASH}" > "ots_proofs/${HASH}.txt"
          ots stamp "ots_proofs/${HASH}.txt"
      
      - name: Commit proof to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ots_proofs/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Add OTS proof for ${{ github.sha }}"
          
          # Retry push up to 3 times in case of race condition
          for i in 1 2 3; do
            git pull --rebase origin "${{ github.ref_name }}" || true
            if git push origin "${{ github.ref_name }}"; then
              echo "Push successful"
              exit 0
            fi
            echo "Push failed, retrying ($i/3)..."
            sleep 2
          done
          
          echo "Push failed after 3 attempts"
          exit 1
